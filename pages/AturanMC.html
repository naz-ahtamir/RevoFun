<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cara Main – Mandarin Catcher</title>
    <!-- Tailwind + Google Fonts -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        @font-face {
            font-family: "BobbyJones";
            src: url("../fonts/BobbyJones.woff2") format("woff2");
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: "BobbyJones", "Noto Sans CJK SC", monospace;
        }

        .btn-fun {
            transition: all 0.2s ease;
        }

        .btn-fun:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }


        .rule-card {
            transition: transform 0.2s;
        }

        .rule-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>

<body class="bg-[url('../images/bg-mandarin-catcher.webp')] bg-cover min-h-screen w-full flex justify-center p-4 items-start">

    <!-- Container utama full layar, fun & menarik -->
    <div class="max-w-7xl w-full min-h-screen rounded-3xl flex flex-col scale-50 origin-center -translate-y-20  backdrop-blur bg-white/69 justify-center items-center">
        <!-- Header dengan animasi sederhana -->
        <div class="text-center py-6 px-4">
            <h1 class="text-7xl font-black text-[#AA9F8D] tracking-wider drop-shadow-lg font-['BobbyJones']">
                ATURAN MAIN
            </h1>
            <p class="text-[#AA9F8D] font-bold mt-1 text-7xl">MANDARIN CATCHER</p>
        </div>

        <!-- Area aturan main (scroll halus tapi cukup muat) -->
        <div class="p-3 space-y-5 text-center">
            <!-- Aturan detail + tips interaktif -->
            <div class="rounded-2xl p-5 space-y-3">
                <ul class="list-none pl-6 text-[#4EA975] space-y-2 text-3xl space-y-6">                    
                    <li><strong class="text-yellow-300">Geser keranjang dengan mouse</strong> untuk menangkap kotak yang sesuai pertanyaan.</li>
                    <li>Tangkapan benar dapat +10 poin dan soal baru; <strong class="text-yellow-300">salah mengurangi kesempatan.</strong></li>
                    <li>Kesempatan hanya 3. <strong class="text-yellow-300">Habis = game over</strong>, simpan skor dengan nama di Top Scorer.</li>                    
                </ul>
            </div>
        </div>

        <!-- Tombol aksi besar menuju game -->
        <div class="p-6 flex justify-center">
            <button id="startGameBtn"
                class="btn-fun bg-[#AA9F8D] hover:bg-[#ADA18A] text-[#D3F2FF] font-bold py-4 px-10 rounded-full text-3xl shadow-2xl flex items-center gap-3 transition-all duration-300 transform hover:scale-105">
                MULAI BERMAIN
            </button>
        </div>
        <script>
            const startBtn = document.getElementById("startGameBtn");
            startBtn.addEventListener("click", () => {
                window.location.href = "../pages/MandarinCatcher.html";
            });
        </script>
    </div>
</body>

</html>
