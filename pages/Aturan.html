<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle">Aturan Main</title>
    <!-- Tailwind dll, sama seperti sebelumnya -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      @font-face {
        font-family: "BobbyJones";
        src: url("../fonts/BobbyJones.woff2") format("woff2");
        font-weight: normal;
        font-style: normal;
      }

      body {
        font-family: "BobbyJones", "Noto Sans CJK SC", monospace;
      }

      .btn-fun {
        transition: all 0.2s ease;
      }

      .btn-fun:hover {
        transform: scale(1.05);
        filter: brightness(1.1);
      }

      .rule-card {
        transition: transform 0.2s;
      }

      .rule-card:hover {
        transform: translateY(-5px);
      }
    </style>
  </head>
  <body
    id="bodyBg"
    class="bg-cover min-h-screen w-full flex justify-center p-4 items-start"
  >
    <div
      class="max-w-7xl w-full min-h-screen rounded-3xl flex flex-col scale-50 origin-center -translate-y-20 backdrop-blur justify-center items-center"
      id="mainContainer"
    >
      <div class="text-center py-6 px-4">
        <h1
          class="text-7xl font-black text-[#AA9F8D] tracking-wider drop-shadow-lg font-['BobbyJones']"
        >
          Aturan MAIN
        </h1>
        <p id="gameName" class="text-[#AA9F8D] font-bold mt-1 text-7xl"></p>
      </div>
      <div class="p-3 space-y-5 text-center">
        <div class="rounded-2xl p-5 space-y-3">
          <ul
            id="rulesList"
            class="list-none pl-6 text-[#4EA975] space-y-2 text-3xl"
          ></ul>
        </div>
      </div>
      <div class="p-6 flex justify-center">
        <button
          id="startGameBtn"
          class="btn-fun bg-[#AA9F8D] hover:bg-[#ADA18A] text-[#D3F2FF] font-bold py-4 px-10 rounded-full text-3xl shadow-2xl flex items-center gap-3 transition-all duration-300 transform hover:scale-105"
        >
          MULAI BERMAIN
        </button>
      </div>
    </div>
    <script src="Aturan.js"></script>
  </body>
</html>
