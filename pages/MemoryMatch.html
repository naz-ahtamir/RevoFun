<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Match | RevoFun</title>
    <!-- Tailwind CSS + Font Awesome -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      @font-face {
        font-family: "BobbyJones";
        src: url("../fonts/BobbyJones.woff2") format("woff2");
        font-weight: normal;
        font-style: normal;
      }

      body {
        font-family: "BobbyJones", "Noto Sans CJK SC", monospace;
        overflow: hidden;
      }

      @keyframes scalePop {
        0% {
          transform: scale(0.95);
          opacity: 0.8;
        }

        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .card-flip-animation {
        animation: scalePop 0.2s ease-out;
      }
    </style>
  </head>

  <body
    class="bg-[url('../images/bg-memory-match.webp')] bg-cover min-h-screen flex justify-center items-center p-5 font-['BobbyJones']"
  >
    <div class="w-full max-w-7xl mx-auto">
      <!-- Board grid: 2 baris x 6 kolom -->
      <div id="gameBoard" class="grid grid-cols-6 grid-rows-2 gap-2 md:gap-3">
        <!-- Kartu akan diisi JavaScript -->
      </div>
    </div>

    <!-- Tombol Reset (kanan bawah) -->
    <button
      id="resetBtn"
      type="button"
      aria-label="Reset permainan"
      title="Reset permainan"
      class="fixed bottom-5 right-5 bg-blue-500 hover:bg-blue-600 text-white rounded-full w-12 h-12 text-xl shadow-lg transition-transform hover:scale-105 flex items-center justify-center z-10"
    >
      <i class="fas fa-sync-alt"></i>
    </button>

    <!-- Tombol Kembali (kiri bawah) -->
    <button
      type="button"
      onclick="window.location.href = '../'"
      aria-label="Kembali ke beranda"
      title="Kembali ke beranda"
      class="fixed bottom-5 left-5 bg-blue-500 hover:bg-blue-600 text-white rounded-full w-12 h-12 text-xl shadow-lg transition-transform hover:scale-105 flex items-center justify-center z-10"
    >
      <i class="fas fa-home"></i>
    </button>
    <script src="../pages/MemoryMatch.js" defer></script>
  </body>
</html>
