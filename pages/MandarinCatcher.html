<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mandarin Catcher | RevoFun</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      @font-face {
        font-family: "BobbyJones";
        src: url("/fonts/BobbyJones.woff2") format("woff2");
        font-weight: normal;
        font-style: normal;
      }

      body {
        font-family: "BobbyJones", "Noto Sans CJK SC", monospace;
        overflow: hidden;
      }

      canvas {
        cursor: pointer;
        display: block;
        margin: 0 auto;
        border-radius: 22px;
        background: white;
      }

      button:active {
        transform: scale(0.97);
      }

      .modal-overlay {
        background: rgba(0, 0, 0, 0.75);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
      }
    </style>
  </head>

  <body
    class="bg-[url('/images/bg-mandarin-catcher.webp')] bg-cover min-h-screen flex items-center justify-center p-3"
  >
    <div
      class="w-full max-w-7xl mx-auto flex flex-col items-center gap-3 relative"
    >
      <!-- Header -->
      <div
        class="px-6 py-3 flex flex-wrap justify-between items-center w-full gap-2"
      >
        <div class="flex items-center gap-3">
          <img
            src="/images/logo-revofun.webp"
            alt="Logo"
            class="h-22 w-auto object-contain"
          />
          <div>
            <div class="text-3xl text-[#A17359] font-bold">TOP SCORER</div>
            <div
              id="topScorerList"
              class="text-[#A17359] font-bold text-2xl leading-tight"
            >
              -
            </div>
          </div>
        </div>
        <div class="text-center">
          <div class="text-2xl font-bold text-[#A17359] tracking-widest">
            TANGKAP KOTAK HANZI YANG SESUAI
          </div>
          <div
            id="questionText"
            class="text-2xl font-bold text-[#F8375A] tracking-widest"
          >
            Memuat...
          </div>
        </div>
        <div class="flex items-center gap-4 whitespace-nowrap">
          <div class="flex items-center gap-1">
            <i class="fas fa-star text-yellow-500"></i>
            <span class="text-[#F8375A] text-2xl font-bold">SKOR : </span>
            <span id="scoreValue" class="text-[#F8375A] text-2xl font-bold"
              >0</span
            >
          </div>
          <div class="flex items-center gap-1">
            <i class="fas fa-heart text-red-500"></i>
            <span class="text-[#F8375A] text-2xl font-bold"
              >SISA KESEMPATAN :
            </span>
            <span id="livesValue" class="text-[#F8375A] text-2xl font-bold"
              >3</span
            >
          </div>
        </div>
      </div>

      <canvas
        id="gameCanvas"
        width="1100"
        height="580"
        class="shadow-2xl bg-white w-full max-w-[1100px] h-auto max-h-[68vh]"
      ></canvas>

      <div class="w-full flex justify-between items-center mt-2 px-2">
        <button
          id="backHomeBtn"
          type="button"
          title="Back to Home"
          onclick="window.location.href = '/'"
          class="fixed bottom-5 left-5 bg-blue-500 hover:bg-blue-600 text-white rounded-full w-12 h-12 text-xl shadow-lg transition-transform hover:scale-105 flex items-center justify-center z-10"
        >
          <i class="fas fa-home"></i>
        </button>
        <button
          id="resetBottomBtn"
          title="Reset Game"
          class="fixed bottom-5 right-5 bg-blue-500 hover:bg-blue-600 text-white rounded-full w-12 h-12 text-xl shadow-lg transition-transform hover:scale-105 flex items-center justify-center z-10"
        >
          <i class="fas fa-sync"></i>
        </button>
      </div>
    </div>

    <!-- MODAL GAME OVER (hanya tombol simpan) -->
    <div
      id="gameOverModal"
      class="hidden fixed inset-0 bg-[#DBCEB2] z-50 items-center justify-center modal-overlay"
    >
      <div
        class="bg-[#DBCEB2] rounded-xl p-6 max-w-md w-full text-center shadow-2xl font-['BobbyJones'] mx-4"
      >
        <h2 class="text-4xl font-bold text-red-600 mb-2">GAME OVER!</h2>
        <p class="text-xl font-semibold mb-2">
          Skor Akhir: <span id="finalScoreModal">0</span>
        </p>
        <p class="mb-1 text-2xl">Masukkan nama:</p>
        <input
          type="text"
          id="playerNameInput"
          class="bg-white/50 text-3xl p-2 rounded-xl w-full my-2 text-center"
          placeholder="Nama"
          maxlength="20"
        />
        <div
          id="modalLeaderboardList"
          class="bg-white/50 rounded-xl p-3 my-3 text-center max-h-32 overflow-y-auto text-xl"
        ></div>
        <div class="gap-3 mt-3">
          <button
            id="saveScoreBtn"
            class="bg-green-600 text-white px-6 py-2 items-center justify-center rounded-full mt-2"
          >
            Simpan & Main Lagi
          </button>
        </div>
      </div>
    </div>
    <script src="/pages/MandarinCatcher.js" defer></script>
  </body>
</html>
