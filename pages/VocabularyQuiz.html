<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vocabulary Quiz | RevoFun</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      @font-face {
        font-family: "BobbyJones";
        src: url("../fonts/BobbyJones.woff2") format("woff2");
        font-weight: normal;
        font-style: normal;
      }

      body {
        font-family: "BobbyJones", "Noto Sans CJK SC", monospace;
        overflow: hidden;
      }

      .option-card {
        transition: all 0.15s ease;
      }

      .option-card:hover {
        transform: translateY(-2px);
        filter: brightness(0.97);
      }

      .opt-bg-0 {
        background-color: #fef08a;
      }

      /* kuning lembut */
      .opt-bg-1 {
        background-color: #bfdbfe;
      }

      /* biru lembut */
      .opt-bg-2 {
        background-color: #a7f3d0;
      }

      /* hijau lembut */
      .opt-bg-3 {
        background-color: #fecdd3;
      }

      /* merah lembut */
      .opt-correct-global {
        background-color: #22c55e !important;
        color: white !important;
      }

      .opt-wrong-global {
        background-color: #ef4444 !important;
        color: white !important;
      }

      #badgeLevel,
      .mt-8.text-sm.text-gray-500.italic {
        display: none;
      }
    </style>
  </head>

  <body
    class="bg-[url('../images/bg-vocabulary-quiz.webp')] bg-cover h-screen w-screen overflow-hidden flex items-center justify-center p-0 m-0"
  >
    <!-- Container utama full layar -->
    <div class="w-screen h-screen flex flex-col overflow-hidden">
      <!-- HEADER : Top Scorer + Info -->
      <div class="px-6 py-3 flex flex-wrap justify-between items-center">
        <div class="flex items-center">
          <div class="flex items-center justify-center">
            <img
              src="../images/logo-revofun.webp"
              alt="Logo"
              class="h-22 w-auto object-contain"
            />
          </div>
          <div>
            <div class="text-2xl text-[#A17359] font-['BobbyJones']">
              TOP SCORER
            </div>
            <div
              id="topScorerDisplay"
              class="text-[#A17359] font-bold text-lg leading-tight font-['BobbyJones']"
            ></div>
          </div>
        </div>
        <div
          class="flex gap-6 text-[white] font-bold px-4 py-2 rounded-full font-['BobbyJones']"
        >
          <div class="flex items-center gap-1">
            ❤️ <span class="text-[#F8375A] text-2xl">SISA KESEMPATAN : </span
            ><span id="livesCount" class="text-[#F8375A] text-2xl">3</span>
          </div>
          <div class="flex items-center gap-1 text-[#A17359] text-2xl">
            LEVEL : HSK <span id="currentLevelNum">1</span>
          </div>
        </div>
      </div>

      <!-- KONTEN UTAMA: DUA KOLOM (kiri 75%, kanan 25%) -->
      <div
        class="flex h-screen overflow-hidden p-5 gap-6 font-['BobbyJones'] mb-8 items-center justify-center"
      >
        <!-- SISI KIRI: Kartu Soal Mandarin -->
        <div
          class="w-[70%] h-[70%] bg-white flex flex-col items-center justify-center p-6 rounded-3xl"
        >
          <div class="text-center w-full">
            <div class="group relative inline-block">
              <div
                class="text-[clamp(3rem,12vw,8rem)] font-black text-gray-800 mb-3 leading-tight cursor-pointer break-words"
                id="hanziText"
              >
                加载中...
              </div>
              <div
                class="absolute left-1/2 -translate-x-1/2 mt-2 text-xl md:text-2xl font-medium text-amber-700 bg-amber-50 px-5 py-2 rounded-full shadow-inner whitespace-nowrap hidden group-hover:block font-sans"
                id="pinyinText"
              >
                -
              </div>
            </div>
            <div class="mt-6 flex justify-center">
              <span
                class="bg-gradient-to-r from-orange-500 to-red-500 text-white px-5 py-1 rounded-full text-sm font-bold shadow"
                id="badgeLevel"
                >HSK ?</span
              >
            </div>
          </div>
        </div>

        <!-- SISI KANAN: 4 Pilihan Jawaban -->
        <div class="w-1/4 flex flex-col gap-4 justify-center">
          <div id="optionsContainer" class="grid grid-cols-1 gap-3"></div>
        </div>
      </div>
    </div>
    <!-- TOMBOL BAWAH: Kembali & Reset -->
    <div class="flex justify-between px-6 py-4">
      <button
        type="button"
        id="homeButton"
        onclick="window.location.href = '../'"
        aria-label="Kembali ke beranda"
        title="Kembali ke beranda"
        class="fixed bottom-5 left-5 bg-blue-500 hover:bg-blue-600 text-white rounded-full w-12 h-12 text-xl shadow-lg transition-transform hover:scale-105 flex items-center justify-center z-10"
      >
        <i class="fas fa-home"></i>
      </button>
      <button
        type="button"
        id="resetButton"
        aria-label="Muat ulang kuis"
        title="Muat ulang kuis"
        class="fixed bottom-5 right-5 bg-blue-500 hover:bg-blue-600 text-white rounded-full w-12 h-12 text-xl shadow-lg transition-transform hover:scale-105 flex items-center justify-center z-10"
      >
        <i class="fas fa-sync"></i>
      </button>
    </div>
    <script src="../pages/VocabularyQuiz.js" defer></script>
  </body>
</html>
